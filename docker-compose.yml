services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: dw_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_PASSWORD}"
    ports:
      - "11433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: always
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "${SQLSERVER_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dw_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dw_backend
    ports:
      - "8000:8000"
    environment:
      - SQLSERVER_HOST=sqlserver
      - SQLSERVER_PORT=1433
      - SQLSERVER_DB=${SQLSERVER_DB}
      - SQLSERVER_USER=${SQLSERVER_USER}
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}
      - SQLSERVER_DRIVER=${SQLSERVER_DRIVER}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: always
    networks:
      - dw_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dw_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: always
    networks:
      - dw_net

  extractor:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      sqlserver:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - dw_net

volumes:
  sqlserver_data:

networks:
  dw_net:                                # 👈 Cria a ponte de comunicação limpa
    driver: bridge